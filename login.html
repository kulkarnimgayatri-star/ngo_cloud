<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | UnityCare NGO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
</head>

<body class="login-body">
    <div class="login-container">
        <div class="login-card reveal active">
            <div class="login-header">
                <a href="index.html" class="login-logo logo">Unity<span>Care</span></a>
                <h2>Welcome Back</h2>
                <p>Log in to your account.</p>
            </div>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="login-role">Select Role</label>
                    <select id="login-role" class="role-select"
                        style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: 8px; font-family: inherit; font-size: 1rem; color: var(--text-color); background-color: var(--card-bg); outline: none;"
                        required>
                        <option value="Donator" selected>Donator</option>
                        <option value="Receiver">Receiver</option>
                        <option value="Worker">Worker</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-primary btn-large">Sign In</button>
            </form>

            <div class="login-divider">
                <span>or continue with</span>
            </div>

            <div class="social-login">
                <button class="social-btn"><img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google">
                    Google</button>
                <button class="social-btn"><img src="https://www.svgrepo.com/show/448234/linkedin.svg" alt="LinkedIn">
                    LinkedIn</button>
            </div>

            <p class="login-footer">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
