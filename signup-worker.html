<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Sign Up | UnityCare NGO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
</head>

<body class="login-body theme-worker">
    <div class="login-container">
        <div class="login-card reveal active">
            <div class="login-header">
                <a href="index.html" class="login-logo logo">Unity<span>Care</span></a>
                <h2>Worker Signup</h2>
                <p>Join the UnityCare team and help us deliver impact.</p>
            </div>

            <form id="signup-form" class="login-form">
                <div class="form-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" placeholder="••••••••" required>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" required> I agree to the <a href="#" class="forgot-password">Terms of
                            Service</a>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-large">Create Account</button>
            </form>

            <div class="login-divider">
                <span>or sign up with</span>
            </div>

            <div class="social-login">
                <button class="social-btn"><img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google">
                    Google</button>
                <button class="social-btn"><img src="https://www.svgrepo.com/show/448234/linkedin.svg" alt="LinkedIn">
                    LinkedIn</button>
            </div>

            <p class="login-footer">
                Already have an account? <a href="login-worker.html">Sign In</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
